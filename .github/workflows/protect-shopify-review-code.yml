name: Protect Shopify review-critical code

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  protect-review-critical-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect protected file changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" || true)"

          PROTECTED_PATTERN='^(extensions/efro-embed/blocks/efro\.liquid|extensions/efro-embed/blocks/efro\.block\.liquid|extensions/efro-embed/assets/efro\.js|shopify\.app\.toml)$'
          PROTECTED_CHANGES="$(echo "${CHANGED_FILES}" | grep -E "${PROTECTED_PATTERN}" || true)"

          if [[ -z "${PROTECTED_CHANGES}" ]]; then
            echo "No protected Shopify review-critical files changed."
            exit 0
          fi

          COMMIT_MESSAGES="$(git log --format=%B "${BASE_SHA}..${HEAD_SHA}" || true)"

          if echo "${COMMIT_MESSAGES}" | grep -q '\[allow-shopify-review-change\]'; then
            echo "Protected files changed with explicit override."
            echo "${PROTECTED_CHANGES}"
            exit 0
          fi

          echo "::error::Protected Shopify review-critical files changed without [allow-shopify-review-change]."
          echo "${PROTECTED_CHANGES}"
          exit 1
