services:
  - type: web
    name: efro-shopify
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://app.avatarsalespro.com
      - key: SHOPIFY_APP_SCOPES
        value: read_products,read_product_listings,read_customers,read_orders
      - key: BRAIN_API_URL
        value: https://efro-five.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
